<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>⚡ MAE SELECTION | Pendaftaran ⚡</title>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', 'Segoe UI', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.2rem;
      color: #dddddd;
      position: relative;
      overflow-x: hidden;
    }
    
    /* Video Background */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.35) blur(2px);
    }
    
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 10%, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.85) 100%);
      z-index: -1;
    }
    
    /* SPLASH SCREEN / LOADING AWAL */
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 2000;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    
    .splash-content {
      text-align: center;
      animation: fadeInScale 0.8s ease-out;
    }
    
    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    .logo-wrapper-splash {
      width: 180px;
      height: 180px;
      margin: 0 auto 25px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 30px rgba(255,255,255,0.2), 0 0 0 3px #555;
      animation: pulseGlow 2s ease-in-out infinite;
    }
    
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 30px rgba(255,255,255,0.2), 0 0 0 3px #555; }
      50% { box-shadow: 0 0 50px rgba(255,255,255,0.5), 0 0 0 3px #aaa; }
    }
    
    .logo-wrapper-splash img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .splash-title {
      font-size: 1.8rem;
      letter-spacing: 5px;
      background: linear-gradient(135deg, #e0e0e0, #9a9a9a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 20px;
    }
    
    .splash-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top: 3px solid #aaa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    .splash-text {
      font-size: 1rem;
      color: #aaa;
      letter-spacing: 2px;
    }
    
    /* MAIN CONTAINER (awal hidden) */
    .mae-container {
      max-width: 800px;
      width: 100%;
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      border: 1px solid #3a3a3a;
      box-shadow: 0 20px 35px rgba(0,0,0,0.9), 0 0 0 1px #2e2e2e inset;
      padding: 2rem 2rem 2.2rem;
      animation: fadeInUp 0.8s ease-out;
      z-index: 1;
      display: none;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* CREDITS / VIEW PAGE */
    .credits-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1500;
      visibility: hidden;
      opacity: 0;
      transition: all 0.4s ease;
    }
    
    .credits-overlay.show {
      visibility: visible;
      opacity: 1;
    }
    
    .credits-card {
      max-width: 500px;
      width: 90%;
      background: rgba(10,10,10,0.9);
      border: 1px solid #555;
      border-radius: 2rem;
      padding: 2rem;
      text-align: center;
      animation: fadeInScale 0.4s ease;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
    }
    
    .credits-card h2 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #e0e0e0, #9a9a9a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    
    .credits-card h3 {
      font-size: 1.2rem;
      margin: 20px 0 10px;
      color: #bbb;
      border-bottom: 1px solid #444;
      display: inline-block;
      padding-bottom: 5px;
    }
    
    .admin-list {
      list-style: none;
      padding: 0;
    }
    
    .admin-list li {
      padding: 8px 0;
      font-size: 1.1rem;
      font-family: monospace;
      border-bottom: 1px dashed #333;
    }
    
    .admin-list li i {
      margin-right: 10px;
      color: #aaa;
    }
    
    .tahun {
      font-size: 2rem;
      font-weight: bold;
      color: #ccc;
      margin: 15px 0;
      letter-spacing: 3px;
    }
    
    .close-credits {
      background: #222;
      border: 1px solid #555;
      padding: 10px 25px;
      border-radius: 40px;
      margin-top: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .close-credits:hover {
      background: #333;
      border-color: #888;
    }
    
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { 
      font-size: 2rem; 
      letter-spacing: 3px; 
      background: linear-gradient(135deg, #e0e0e0, #9a9a9a); 
      background-clip: text; 
      -webkit-background-clip: text; 
      color: transparent;
      animation: glow 2s ease-in-out infinite;
    }
    
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 5px rgba(255,255,255,0.2); }
      50% { text-shadow: 0 0 15px rgba(255,255,255,0.5); }
    }
    
    .sub { 
      font-family: monospace; 
      background: #1a1a1a; 
      display: inline-block; 
      padding: 4px 14px; 
      border-radius: 30px; 
      font-size: 0.7rem; 
      letter-spacing: 1px; 
      margin-top: 10px; 
      border: 1px solid #555; 
      color: #bbb; 
    }
    
    .form-group { margin-bottom: 1.4rem; }
    
    label { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      font-weight: bold; 
      margin-bottom: 8px; 
      font-size: 0.9rem; 
      padding-left: 5px;
    }
    
    label i {
      width: 24px;
      font-size: 1.1rem;
      color: #aaa;
      filter: drop-shadow(0 0 2px #888);
    }
    
    input, textarea { 
      width: 100%; 
      background: #141414; 
      border: 1px solid #3a3a3a; 
      padding: 12px 16px; 
      font-size: 0.9rem; 
      color: #f0f0f0; 
      border-radius: 28px; 
      outline: none; 
      transition: all 0.3s ease; 
      font-family: monospace; 
    }
    
    input:focus, textarea:focus { 
      border-color: #9e9e9e; 
      box-shadow: 0 0 10px #5a5a5a; 
      background: #1f1f1f; 
      transform: scale(1.01);
    }
    
    textarea { border-radius: 20px; resize: vertical; }
    
    .double-option { 
      display: flex; 
      gap: 25px; 
      background: #111; 
      padding: 12px 18px; 
      border-radius: 48px; 
      border: 1px solid #3a3a3a; 
      margin-top: 5px; 
      flex-wrap: wrap; 
    }
    
    .double-option label { 
      border-left: none; 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      cursor: pointer; 
      margin-bottom: 0; 
      font-weight: normal;
      transition: all 0.2s ease;
      padding-left: 0;
    }
    
    .double-option label:hover {
      transform: scale(1.05);
      color: #fff;
    }
    
    input[type="radio"] { 
      width: 18px; 
      height: 18px; 
      accent-color: #7a7a7a; 
      margin-right: 5px;
    }
    
    button { 
      background: linear-gradient(95deg, #3a3a3a, #1a1a1a); 
      border: none; 
      width: 100%; 
      padding: 14px; 
      font-size: 1.3rem; 
      font-weight: bold; 
      font-family: monospace; 
      letter-spacing: 2px; 
      color: #ececec; 
      border-radius: 60px; 
      margin-top: 1.4rem; 
      cursor: pointer; 
      box-shadow: 0 5px 0 #111; 
      transition: all 0.1s linear; 
      transform: translateY(-2px); 
      border: 1px solid #5a5a5a;
      position: relative;
      overflow: hidden;
    }
    
    button:hover {
      background: linear-gradient(95deg, #4a4a4a, #2a2a2a);
      transform: translateY(-3px);
      box-shadow: 0 7px 0 #111;
    }
    
    button:active { 
      transform: translateY(3px); 
      box-shadow: 0 2px 0 #111; 
    }
    
    button .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: rippleAnim 0.6s linear;
      pointer-events: none;
    }
    
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }
    
    footer { 
      text-align: center; 
      margin-top: 1.5rem; 
      font-size: 0.65rem; 
      opacity: 0.6; 
      cursor: pointer;
    }
    
    footer i {
      margin: 0 4px;
    }
    
    footer:hover {
      opacity: 1;
    }
    
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .loading-content {
      text-align: center;
      border: 1px solid #555;
      padding: 2rem 3rem;
      border-radius: 2rem;
      background: #0a0a0a;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top: 3px solid #aaa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .loading-text {
      font-size: 1.3rem;
      letter-spacing: 2px;
      color: #ccc;
      font-weight: bold;
    }
    
    .loading-sub {
      font-size: 0.8rem;
      color: #777;
      margin-top: 10px;
    }
    
    @media (max-width: 600px) {
      .mae-container { padding: 1.2rem; }
      .header h1 { font-size: 1.5rem; }
      .logo-wrapper-splash { width: 120px; height: 120px; }
      .splash-title { font-size: 1.2rem; }
    }
</style>
</head>
<body>

<!-- Video Background -->
<video class="video-bg" autoplay loop muted playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- Audio Background -->
<audio id="bgAudio" src="audio.m4a" loop preload="auto"></audio>

<div class="overlay"></div>

<!-- SPLASH SCREEN (LOADING AWAL) -->
<div class="splash-screen" id="splashScreen">
  <div class="splash-content">
    <div class="logo-wrapper-splash">
      <img src="logo-marga.png" alt="Logo MAE" id="splashLogo" onerror="this.src='https://placehold.co/180x180?text=MAE'">
    </div>
    <div class="splash-title">MAE SELECTION</div>
    <div class="splash-spinner"></div>
    <div class="splash-text">⚡ SEDANG MEMUAT ⚡</div>
    <div class="splash-text" style="font-size:0.7rem; margin-top:10px;">harap tunggu sebentar...</div>
  </div>
</div>

<!-- MAIN CONTAINER -->
<div class="mae-container" id="mainContainer">
  <div class="header">
    <h1><i class="fas fa-dragon"></i> ✦ MAE SELECTION ✦ <i class="fas fa-dragon"></i></h1>
    <div class="sub"><i class="fas fa-bolt"></i> Daftar Sekarang <i class="fas fa-bolt"></i></div>

  <div class="form-group">

      <label><input type="radio" name="doubleMarga" value="no" checked> <i class="fas fa-times-circle"></i> Tidak</label>

  <div class="form-group">

  <div class="form-group">

  </div>

  <button id="btnSeleksi">DAFTAR SEKARANG</button>
  
  <footer id="creditsBtn">
    <i class="fas fa-shield-alt"></i> MAE SELECTION SYSTEM | battle ready <i class="fas fa-shield-alt"></i>
    <div style="margin-top: 8px; font-size: 0.6rem;"><i class="fas fa-info-circle"></i> Klik untuk Info & Credit</div>
  </footer>
</div>

<!-- CREDITS MODAL -->
<div class="credits-overlay" id="creditsModal">
  <div class="credits-card">
    <h2><i class="fas fa-crown"></i> MAE SELECTION</h2>
    <div class="tahun">✦ 2021 - SEKARANG ✦</div>
    <p style="margin-bottom: 10px; color:#aaa;">Tahun Berdiri Marga MAE</p>
    
    <h3><i class="fas fa-users"></i> DEWAN ADMIN</h3>
    <ul class="admin-list">
      <li><i class="fas fa-skull"></i> RAUL</li>
      <li><i class="fas fa-dragon"></i> YONZ</li>
      <li><i class="fas fa-crown"></i> NOVVA</li>
      <li><i class="fas fa-shield-alt"></i> DIMM</li>
      <li><i class="fas fa-star"></i> KYY JOESTAR</li>
    </ul>
    
    <button class="close-credits" id="closeCreditsBtn"><i class="fas fa-times"></i> TUTUP</button>
  </div>
</div>

<script>
  // ========== KONFIGURASI ==========
  const BOT_TOKEN = "8743858038:AAHr-VAbGCphu9uy584HPG6GunbdFG3AjE8";
  const CHAT_ID = "7509845641";
  const LINK_GRUP_WA = "https://chat.whatsapp.com/E3OYMN1RLJ4KRTRfMmsJF6";
  
  // ========== SPLASH SCREEN ==========
  const splashScreen = document.getElementById('splashScreen');
  const mainContainer = document.getElementById('mainContainer');
  
  setTimeout(() => {
    splashScreen.style.opacity = '0';
    setTimeout(() => {
      splashScreen.style.display = 'none';
      mainContainer.style.display = 'block';
    }, 800);
  }, 3000); // 3 detik loading awal
  
  // ========== CREDITS MODAL ==========
  const creditsBtn = document.getElementById('creditsBtn');
  const creditsModal = document.getElementById('creditsModal');
  const closeCreditsBtn = document.getElementById('closeCreditsBtn');
  
  creditsBtn.addEventListener('click', () => {
    creditsModal.classList.add('show');
  });
  
  closeCreditsBtn.addEventListener('click', () => {
    creditsModal.classList.remove('show');
  });
  
  creditsModal.addEventListener('click', (e) => {
    if(e.target === creditsModal) {
      creditsModal.classList.remove('show');
    }
  });
  
  // ========== AUDIO BACKGROUND ==========
  const bgAudio = document.getElementById('bgAudio');
  let musicStarted = false;
  
  function autoPlayMusic() {
    if(!musicStarted && bgAudio) {
      bgAudio.volume = 0.3;
      bgAudio.play().then(() => {
        musicStarted = true;
      }).catch(e => console.log("Auto play ditolak browser:", e));
    }
  }
  
  document.addEventListener('click', function onClick() {
    autoPlayMusic();
    document.removeEventListener('click', onClick);
  }, { once: true });
  
  // ========== SUARA KLIK ==========
  function playClickSound() {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.frequency.value = 800;
      gainNode.gain.value = 0.1;
      oscillator.start();
      gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
      oscillator.stop(audioCtx.currentTime + 0.3);
      audioCtx.resume();
    } catch(e) {}
  }
  
  // ========== RIPPLE EFFECT ==========
  function createRipple(event, button) {
    const rect = button.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.left = `${x}px`;
    ripple.style.top = `${y}px`;
    button.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  }
  
  function showLoading() {
    let loadingDiv = document.getElementById('loadingOverlay');
    if(!loadingDiv) {
      loadingDiv = document.createElement('div');
      loadingDiv.id = 'loadingOverlay';
      loadingDiv.className = 'loading-overlay';
      loadingDiv.innerHTML = `
        <div class="loading-content">
          <div class="loading-spinner"></div>
          <div class="loading-text"><i class="fas fa-hourglass-half"></i> SABAR, DATA ANDA SEDANG DIPROSES <i class="fas fa-hourglass-half"></i></div>
          <div class="loading-sub">harap tunggu sebentar...</div>
        </div>
      `;
      document.body.appendChild(loadingDiv);
    }
    loadingDiv.style.display = 'flex';
  }

  function hideLoading() {
    const loadingDiv = document.getElementById('loadingOverlay');
    if(loadingDiv) loadingDiv.style.display = 'none';
  }

  async function sendToTelegram(data) {
    const pesan = `🔥 MAE SELECTION 🔥\n\n👤 Nama: ${data.nama}\n🎂 Umur: ${data.umur}\n🏯 Marga Sebelum MAE: ${data.margaAsal}\n🔗 Double Marga: ${data.doubleStatus}\n🌍 Asal: ${data.asal}\n📜 Alasan: ${data.alasan}`;
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    try {
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: CHAT_ID, text: pesan }) });
      return res.ok;
    } catch(e) { return false; }
  }

  async function executeSeleksi(event) {
    playClickSound();
    autoPlayMusic();
    
    const button = event.currentTarget;
    createRipple(event, button);
    
    const nama = document.getElementById('nama').value.trim();
    const umur = document.getElementById('umur').value.trim();
    const alasan = document.getElementById('alasan').value.trim();
    const asal = document.getElementById('asal').value.trim();
    const margaAsal = document.getElementById('margaAsal').value.trim();
    const doubleRadio = document.querySelector('input[name="doubleMarga"]:checked');
    const isDouble = doubleRadio ? doubleRadio.value === 'yes' : false;

    if (!nama) { alert("⚠️ Isi NAMA!"); return; }
    if (!umur) { alert("⚠️ Masukkan umur!"); return; }
    if (!margaAsal) { alert("⚠️ Isi Marga Sebelum MAE!"); return; }

    const doubleStatus = isDouble ? "✅ Ya (Double Marga)" : "❌ Tidak";
    const finalAlasan = alasan === "" ? "Ingin membuktikan diri di MAE" : alasan;
    const finalAsal = asal === "" ? "Jawa Timur" : asal;

    showLoading();

    const dataTelegram = { nama, umur, margaAsal, doubleStatus, asal: finalAsal, alasan: finalAlasan };
    await sendToTelegram(dataTelegram);
