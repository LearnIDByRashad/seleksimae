<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>⚡ MAE SELECTION | Official x Collab Battle ⚡</title>
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 10%, #0a0a0a 0%, #010101 100%);
      font-family: 'Poppins', 'Segoe UI', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.2rem;
      color: #dddddd;
    }

    .mae-container {
      max-width: 880px;
      width: 100%;
      background: rgba(5, 5, 5, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      border: 1px solid #3a3a3a;
      box-shadow: 0 20px 35px rgba(0,0,0,0.9), 0 0 0 1px #2e2e2e inset;
      padding: 2rem 2rem 2.2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    /* tanpa emoji di atas MAE SELECTION, hanya teks */
    .header h1 {
      font-size: 2rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #e0e0e0, #9a9a9a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 5px rgba(0,0,0,0.5);
    }

    .sub {
      font-family: monospace;
      background: #1a1a1a;
      display: inline-block;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 0.7rem;
      letter-spacing: 1px;
      margin-top: 10px;
      border: 1px solid #555;
      color: #bbb;
    }

    .form-group {
      margin-bottom: 1.4rem;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 0.9rem;
      border-left: 3px solid #777;
      padding-left: 12px;
      letter-spacing: 0.5px;
    }

    .label-emoji {
      font-size: 1.2rem;
      filter: drop-shadow(0 0 3px #aaa);
    }

    input, select, textarea {
      width: 100%;
      background: #141414;
      border: 1px solid #3a3a3a;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #f0f0f0;
      border-radius: 28px;
      outline: none;
      transition: 0.2s;
      font-family: monospace;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #9e9e9e;
      box-shadow: 0 0 10px #5a5a5a;
      background: #1f1f1f;
    }

    textarea {
      border-radius: 20px;
      resize: vertical;
    }

    .double-option {
      display: flex;
      gap: 25px;
      background: #111;
      padding: 12px 18px;
      border-radius: 48px;
      border: 1px solid #3a3a3a;
      margin-top: 5px;
    }

    .double-option label {
      border-left: none;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      margin-bottom: 0;
      font-weight: normal;
    }

    input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #7a7a7a;
    }

    .mega-marga {
      display: flex;
      flex-direction: row;
      gap: 20px;
      margin: 20px 0 15px;
      flex-wrap: wrap;
    }

    .marga-card {
      flex: 1;
      background: #0f0f0f;
      border-radius: 28px;
      padding: 1.2rem 0.8rem;
      text-align: center;
      cursor: pointer;
      border: 1px solid #444;
      transition: 0.2s;
    }

    .marga-card:hover {
      transform: translateY(-3px);
      border-color: #888;
      background: #181818;
    }

    .selected-marga-card {
      background: #222;
      border: 2px solid #b0b0b0;
      box-shadow: 0 0 12px #5a5a5a;
    }

    .marga-emoji {
      font-size: 2.8rem;
      filter: drop-shadow(0 0 6px #aaa);
      margin-bottom: 8px;
    }

    .marga-title {
      font-size: 1.4rem;
      font-weight: bold;
      color: #e0e0e0;
    }

    .marga-desc {
      font-size: 0.7rem;
      color: #aaa;
      margin-top: 6px;
    }

    button {
      background: linear-gradient(95deg, #3a3a3a, #1a1a1a);
      border: none;
      width: 100%;
      padding: 14px;
      font-size: 1.3rem;
      font-weight: bold;
      font-family: monospace;
      letter-spacing: 2px;
      color: #ececec;
      border-radius: 60px;
      margin-top: 1.4rem;
      cursor: pointer;
      box-shadow: 0 5px 0 #111;
      transition: 0.07s linear;
      transform: translateY(-2px);
      border: 1px solid #5a5a5a;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #111;
    }

    .result-card {
      margin-top: 2rem;
      background: #0c0c0ccc;
      border-radius: 2rem;
      padding: 1.5rem;
      border: 1px solid #5a5a5a;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .battle-emblem {
      font-size: 2.5rem;
      filter: drop-shadow(0 0 8px #aaa);
      margin: 8px 0;
    }

    .result-name {
      font-size: 1.8rem;
      font-weight: bold;
      color: #ddd;
      border-bottom: 1px dashed #777;
      display: inline-block;
      margin-bottom: 10px;
    }

    .info-line {
      font-size: 0.85rem;
      margin: 6px 0;
      color: #bbb;
      font-family: monospace;
    }

    .badge-marga {
      font-size: 1.5rem;
      font-weight: bold;
      background: #222;
      display: inline-block;
      padding: 5px 20px;
      border-radius: 40px;
      margin: 10px 0;
    }

    footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.65rem;
      opacity: 0.6;
    }
    hr {
      border-color: #333;
      margin: 12px 0;
    }
    @media (max-width: 600px) {
      .mae-container { padding: 1.2rem; }
      .mega-marga { flex-direction: column; }
      .result-name { font-size: 1.3rem; }
    }
</style>
</head>
<body>
<div class="mae-container">
  <div class="header">
    <!-- Emoji di atas MAE SELECTION sudah dihapus total -->
    <h1>✦ MAE SELECTION ✦</h1>
    <div class="sub">「 Official · Collab Battle · Double Bloodline 」</div>
  </div>

  <!-- 5 kolom identitas -->
  <div class="form-group">
    <label><span class="label-emoji">🪪</span> 1. Nama Lengkap</label>
    <input type="text" id="nama" placeholder="ex: Arka Veyron / Lina Shadow" autocomplete="off">
  </div>

  <div class="form-group">
    <label><span class="label-emoji">🎂</span> 2. Umur</label>
    <input type="text" id="umur" placeholder="19 / 22 / 27">
  </div>

  <div class="form-group">
    <label><span class="label-emoji">⚔️</span> 3. Alasan Masuk MAE</label>
    <textarea id="alasan" rows="2" placeholder="Cari kekuatan, membangun kolaborasi, membuktikan diri..."></textarea>
  </div>

  <div class="form-group">
    <label><span class="label-emoji">🔗</span> 4. Double Marga ? (boleh dua marga sekaligus)</label>
    <div class="double-option">
      <label>
        <input type="radio" name="doubleMarga" value="yes"> ✅ Ya, Double Marga
      </label>
      <label>
        <input type="radio" name="doubleMarga" value="no" checked> ❌ Tidak, pilih satu
      </label>
    </div>
  </div>

  <div class="form-group">
    <label><span class="label-emoji">🏝️</span> 5. Asal Daerah / Domain</label>
    <input type="text" id="asal" placeholder="Contoh: Jawa Barat, Jawa Tengah, Jawa Timur">
  </div>

  <!-- Pilihan marga kebesaran -->
  <div style="margin: 15px 0 5px 0;">
    <label><span class="label-emoji">🏛️</span> Pilih Marga Kebesaran</label>
  </div>
  <div class="mega-marga" id="margaSelector"></div>

  <button id="btnSeleksi">⚡ EKSEKUSI SELEKSI ⚡</button>

  <div class="result-card" id="resultBox" style="display: none;">
    <div class="battle-emblem" id="embleMarga">🏅</div>
    <div class="result-name" id="resultNama">-</div>
    <div class="info-line" id="resultUmurAsal"></div>
    <div class="badge-marga" id="resultMargaDisplay">-</div>
    <div class="info-line" id="resultDoubleStatus"></div>
    <div id="resultAlasan" style="margin-top: 12px; font-size:0.85rem; padding: 8px; background:#111; border-radius: 20px;"></div>
    <hr>
    <div id="descBattle" style="font-size:0.8rem; color:#aaa;">——— battle chronicle ———</div>
  </div>
  <footer>⚡ MAE SELECTION SYSTEM | two great houses | double bloodline allowed ⚡</footer>
</div>

<script>
  // Data dua marga utama
  const margaMaster = [
    {
      id: "official",
      nama: "MAE OFFICIAL",
      title: "MAE OFFICIAL",
      emblem: "⚜️🔱",
      descBattle: "Garda utama MAE. Membawa standar tertinggi, loyalitas absolut, dan tatanan pertempuran sempurna.",
      sloganTambah: "Official Path — Unbroken Code"
    },
    {
      id: "collab",
      nama: "MAE COLLAB AND BATTLE",
      title: "MAE COLLAB ⚔️ BATTLE",
      emblem: "🤝⚡",
      descBattle: "Aliansi para petarung lintas alam, synergy mematikan. Jiwa kolaborasi dan kekuatan kolektif.",
      sloganTambah: "Unity Strike — Battle Roar"
    }
  ];

  let selectedMarga = null;

  function renderMargaCards() {
    const container = document.getElementById('margaSelector');
    if (!container) return;
    container.innerHTML = '';
    margaMaster.forEach(m => {
      const card = document.createElement('div');
      card.className = 'marga-card';
      if (selectedMarga && selectedMarga.id === m.id) card.classList.add('selected-marga-card');
      
      card.innerHTML = `
        <div class="marga-emoji">${m.emblem.split('').map(ch => `<span style="filter: drop-shadow(0 0 4px #aaa); display:inline-block;">${ch}</span>`).join('')}</div>
        <div class="marga-title">${m.title}</div>
        <div class="marga-desc">${m.descBattle.substring(0, 55)}...</div>
      `;
      card.onclick = () => {
        selectedMarga = m;
        document.querySelectorAll('.marga-card').forEach(c => c.classList.remove('selected-marga-card'));
        card.classList.add('selected-marga-card');
      };
      container.appendChild(card);
    });
  }

  function setDefaultMarga() {
    if (!selectedMarga && margaMaster.length) {
      selectedMarga = margaMaster[0];
      renderMargaCards();
    }
  }

  function executeSeleksi() {
    const nama = document.getElementById('nama').value.trim();
    const umur = document.getElementById('umur').value.trim();
    const alasan = document.getElementById('alasan').value.trim();
    const asal = document.getElementById('asal').value.trim();
    const doubleRadio = document.querySelector('input[name="doubleMarga"]:checked');
    const isDouble = doubleRadio ? doubleRadio.value === 'yes' : false;

    if (!nama) {
      alert("⚠️ Isi NAMA dulu, prajurit!");
      return;
    }
    if (!umur) {
      alert("⚠️ Masukkan umur!");
      return;
    }
    if (!selectedMarga) {
      alert("⚔️ Pilih salah satu Marga: MAE OFFICIAL atau MAE COLLAB AND BATTLE");
      return;
    }

    let margaAkhir = selectedMarga.nama;
    let doubleDesc = "";
    if (isDouble) {
      const otherMarga = margaMaster.find(m => m.id !== selectedMarga.id);
      if (otherMarga) {
        margaAkhir = `${selectedMarga.nama} ✦ ${otherMarga.nama}`;
        doubleDesc = "⚡ DOUBLE BLOODLINE : kedua marga menyatu dalam dirimu ⚡";
      } else {
        doubleDesc = "⚠️ Double marga hanya tersedia jika kedua klan aktif";
      }
    } else {
      doubleDesc = "🎯 Single Marga : murni satu garis kebesaran";
    }

    const finalAlasan = alasan === "" ? "Ingin membuktikan diri di medan MAE" : alasan;
    const finalAsal = asal === "" ? "Jawa Timur" : asal;
    
    document.getElementById('resultNama').innerText = nama;
    document.getElementById('resultUmurAsal').innerHTML = `🎂 ${umur} th  |  🌍 ${finalAsal}`;
    document.getElementById('resultMargaDisplay').innerHTML = margaAkhir;
    document.getElementById('resultDoubleStatus').innerHTML = doubleDesc;
    document.getElementById('resultAlasan').innerHTML = `📜 ALASAN MASUK: “${finalAlasan}”`;
    
    const rawEmblem = selectedMarga.emblem;
    const emblemWithShadow = rawEmblem.split('').map(ch => `<span style="filter: drop-shadow(0 0 6px #aaa); display:inline-block;">${ch}</span>`).join('');
    document.getElementById('embleMarga').innerHTML = emblemWithShadow + " <span style='filter:drop-shadow(0 0 4px silver);'>⚡</span>";
    
    const descElem = document.getElementById('descBattle');
    descElem.innerHTML = `⚔️ ${selectedMarga.descBattle} <br> ✦ ${selectedMarga.sloganTambah} ✦`;
    
    const resultBox = document.getElementById('resultBox');
    resultBox.style.display = "block";
    resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    
    resultBox.style.transform = "scale(1.01)";
    setTimeout(() => { if(resultBox) resultBox.style.transform = ""; }, 250);
  }

  document.getElementById('btnSeleksi').addEventListener('click', executeSeleksi);
  renderMargaCards();
  setDefaultMarga();

  const inputs = document.querySelectorAll('input, textarea');
  inputs.forEach(inp => {
    inp.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') executeSeleksi();
    });
  });
</script>
</body>
</html>
