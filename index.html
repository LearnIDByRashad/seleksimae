<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>⚡ MAE SELECTION | Pendaftaran ⚡</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at 30% 10%, #0a0a0a 0%, #010101 100%);
      font-family: 'Poppins', 'Segoe UI', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.2rem;
      color: #dddddd;
    }
    .mae-container {
      max-width: 800px;
      width: 100%;
      background: rgba(5, 5, 5, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      border: 1px solid #3a3a3a;
      box-shadow: 0 20px 35px rgba(0,0,0,0.9), 0 0 0 1px #2e2e2e inset;
      padding: 2rem 2rem 2.2rem;
    }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-size: 2rem; letter-spacing: 3px; background: linear-gradient(135deg, #e0e0e0, #9a9a9a); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .sub { font-family: monospace; background: #1a1a1a; display: inline-block; padding: 4px 14px; border-radius: 30px; font-size: 0.7rem; letter-spacing: 1px; margin-top: 10px; border: 1px solid #555; color: #bbb; }
    .form-group { margin-bottom: 1.4rem; }
    label { display: flex; align-items: center; gap: 8px; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; border-left: 3px solid #777; padding-left: 12px; }
    .label-emoji { font-size: 1.2rem; filter: drop-shadow(0 0 2px #aaa); }
    input, textarea { width: 100%; background: #141414; border: 1px solid #3a3a3a; padding: 12px 16px; font-size: 0.9rem; color: #f0f0f0; border-radius: 28px; outline: none; transition: 0.2s; font-family: monospace; }
    input:focus, textarea:focus { border-color: #9e9e9e; box-shadow: 0 0 10px #5a5a5a; background: #1f1f1f; }
    textarea { border-radius: 20px; resize: vertical; }
    .double-option { display: flex; gap: 25px; background: #111; padding: 12px 18px; border-radius: 48px; border: 1px solid #3a3a3a; margin-top: 5px; flex-wrap: wrap; }
    .double-option label { border-left: none; display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 0; font-weight: normal; }
    input[type="radio"] { width: 18px; height: 18px; accent-color: #7a7a7a; }
    button { background: linear-gradient(95deg, #3a3a3a, #1a1a1a); border: none; width: 100%; padding: 14px; font-size: 1.3rem; font-weight: bold; font-family: monospace; letter-spacing: 2px; color: #ececec; border-radius: 60px; margin-top: 1.4rem; cursor: pointer; box-shadow: 0 5px 0 #111; transition: 0.07s linear; transform: translateY(-2px); border: 1px solid #5a5a5a; }
    button:active { transform: translateY(3px); box-shadow: 0 1px 0 #111; }
    footer { text-align: center; margin-top: 1.5rem; font-size: 0.65rem; opacity: 0.6; }
    
    /* LOADING OVERLAY */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 1000;
      font-family: monospace;
    }
    .loading-content {
      text-align: center;
      border: 1px solid #555;
      padding: 2rem 3rem;
      border-radius: 2rem;
      background: #0a0a0a;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top: 3px solid #aaa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text {
      font-size: 1.3rem;
      letter-spacing: 2px;
      color: #ccc;
      font-weight: bold;
    }
    .loading-sub {
      font-size: 0.8rem;
      color: #777;
      margin-top: 10px;
    }
    @media (max-width: 600px) {
      .mae-container { padding: 1.2rem; }
      .header h1 { font-size: 1.5rem; }
    }
</style>
</head>
<body>
<div class="mae-container">
  <div class="header">
    <h1>✦ MAE SELECTION ✦</h1>
    <div class="sub">「 Daftar Sekarang · Battle Royale 」</div>
  </div>

  <div class="form-group"><label><span class="label-emoji">🪪</span> 1. Nama Lengkap</label><input type="text" id="nama" placeholder="ex: Arka Veyron / Lina Shadow"></div>
  <div class="form-group"><label><span class="label-emoji">🎂</span> 2. Umur</label><input type="text" id="umur" placeholder="19 / 22 / 27"></div>
  <div class="form-group"><label><span class="label-emoji">⚔️</span> 3. Alasan Masuk MAE</label><textarea id="alasan" rows="2" placeholder="Cari kekuatan, membangun kolaborasi..."></textarea></div>
  
  <!-- Double Marga pilihan -->
  <div class="form-group"><label><span class="label-emoji">🔗</span> 4. Double Marga ?</label><div class="double-option"><label><input type="radio" name="doubleMarga" value="yes"> ✅ Ya, Double Marga</label><label><input type="radio" name="doubleMarga" value="no" checked> ❌ Tidak</label></div></div>
  
  <!-- Marga Sebelum MAE: input teks -->
  <div class="form-group"><label><span class="label-emoji">🏯</span> 5. Marga Sebelum MAE</label><input type="text" id="margaAsal" placeholder="Contoh: kgn, nca, wangy, nka, dll"></div>
  
  <div class="form-group"><label><span class="label-emoji">🏝️</span> 6. Asal Daerah</label><input type="text" id="asal" placeholder="Contoh: Jawa Barat, Jawa Tengah, Jawa Timur"></div>

  <button id="btnSeleksi">⚡ DAFTAR SEKARANG ⚡</button>
  <footer>⚡ MAE SELECTION SYSTEM | battle ready ⚡</footer>
</div>

<script>
  // ========== KONFIGURASI ==========
  const BOT_TOKEN = "8743858038:AAHr-VAbGCphu9uy584HPG6GunbdFG3AjE8";
  const CHAT_ID = "7509845641";
  const LINK_GRUP_WA = "https://chat.whatsapp.com/E3OYMN1RLJ4KRTRfMmsJF6";

  function showLoading() {
    let loadingDiv = document.getElementById('loadingOverlay');
    if(!loadingDiv) {
      loadingDiv = document.createElement('div');
      loadingDiv.id = 'loadingOverlay';
      loadingDiv.className = 'loading-overlay';
      loadingDiv.innerHTML = `
        <div class="loading-content">
          <div class="loading-spinner"></div>
          <div class="loading-text">⚡ SABAR, DATA ANDA SEDANG DIPROSES ⚡</div>
          <div class="loading-sub">harap tunggu sebentar...</div>
        </div>
      `;
      document.body.appendChild(loadingDiv);
    }
    loadingDiv.style.display = 'flex';
  }

  function hideLoading() {
    const loadingDiv = document.getElementById('loadingOverlay');
    if(loadingDiv) loadingDiv.style.display = 'none';
  }

  async function sendToTelegram(data) {
    const pesan = `🔥 MAE SELECTION 🔥\n\n👤 Nama: ${data.nama}\n🎂 Umur: ${data.umur}\n🏯 Marga Sebelum MAE: ${data.margaAsal}\n🔗 Double Marga: ${data.doubleStatus}\n🌍 Asal: ${data.asal}\n📜 Alasan: ${data.alasan}`;
    
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    try {
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: CHAT_ID, text: pesan }) });
      return res.ok;
    } catch(e) { return false; }
  }

  async function executeSeleksi() {
    const nama = document.getElementById('nama').value.trim();
    const umur = document.getElementById('umur').value.trim();
    const alasan = document.getElementById('alasan').value.trim();
    const asal = document.getElementById('asal').value.trim();
    const margaAsal = document.getElementById('margaAsal').value.trim();
    const doubleRadio = document.querySelector('input[name="doubleMarga"]:checked');
    const isDouble = doubleRadio ? doubleRadio.value === 'yes' : false;

    // Validasi
    if (!nama) { alert("⚠️ Isi NAMA!"); return; }
    if (!umur) { alert("⚠️ Masukkan umur!"); return; }
    if (!margaAsal) { alert("⚠️ Isi Marga Sebelum MAE (contoh: kgn, nca, wangy)!"); return; }

    const doubleStatus = isDouble ? "✅ Ya (Double Marga)" : "❌ Tidak";
    const finalAlasan = alasan === "" ? "Ingin membuktikan diri di MAE" : alasan;
    const finalAsal = asal === "" ? "Jawa Timur" : asal;

    // Tampilkan loading
    showLoading();

    // Kirim ke Telegram
    const dataTelegram = { nama, umur, margaAsal, doubleStatus, asal: finalAsal, alasan: finalAlasan };
    await sendToTelegram(dataTelegram);

    // Delay acak antara 2-5 detik (2000 - 5000 ms)
    const delay = Math.floor(Math.random() * (5000 - 2000 + 1) + 2000);
    
    setTimeout(() => {
      hideLoading();
      // Buka link WhatsApp grup
      window.open(LINK_GRUP_WA, '_blank');
      // Reset form (opsional)
      // document.getElementById('nama').value = '';
      // document.getElementById('umur').value = '';
      // document.getElementById('margaAsal').value = '';
      // document.getElementById('alasan').value = '';
      // document.getElementById('asal').value = '';
    }, delay);
  }

  document.getElementById('btnSeleksi').addEventListener('click', executeSeleksi);
</script>
</body>
</html>
