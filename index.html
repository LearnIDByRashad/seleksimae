<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>👑 Royal Marga Selection | Bangkitkan Nama Besarmu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* slight royal feel, text can be selected though */
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0705 0%, #010101 100%);
      font-family: 'Cinema', 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      color: #eedd99;
    }

    /* royal gold & dark container */
    .royal-container {
      max-width: 760px;
      width: 100%;
      background: rgba(10, 8, 5, 0.75);
      backdrop-filter: blur(2px);
      border-radius: 3rem 2rem 3rem 2rem;
      border: 1px solid rgba(212, 175, 55, 0.5);
      box-shadow: 0 25px 45px rgba(0,0,0,0.7), 0 0 0 2px rgba(212, 175, 55, 0.2) inset, 0 0 20px rgba(255, 215, 0, 0.2);
      padding: 2rem 2rem 2.5rem;
      transition: all 0.3s;
    }

    /* header crown */
    .crown-header {
      text-align: center;
      margin-bottom: 1.8rem;
      position: relative;
    }
    .crown-header h1 {
      font-size: 2.2rem;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #e9c468 0%, #b58b2f 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 8px rgba(0,0,0,0.5);
      display: inline-block;
      border-bottom: 2px solid #cd9f3c;
      padding-bottom: 8px;
    }
    .crown-icon {
      font-size: 2.8rem;
      filter: drop-shadow(0 0 4px gold);
      margin-bottom: 6px;
    }
    .sub {
      font-family: monospace;
      letter-spacing: 2px;
      color: #c9aa4b;
      font-size: 0.85rem;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* form styling */
    .form-group {
      margin-bottom: 1.6rem;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 1.05rem;
      letter-spacing: 1px;
      color: #f3e1a0;
      border-left: 3px solid #e4b641;
      padding-left: 12px;
    }
    input, select {
      width: 100%;
      background: #1e1b16;
      border: 1px solid #5f4a28;
      padding: 14px 18px;
      font-size: 1rem;
      font-family: 'Segoe UI', 'Georgia', serif;
      color: #f7eac5;
      border-radius: 28px;
      outline: none;
      transition: all 0.25s ease;
      box-shadow: inset 0 1px 3px #00000033;
    }
    input:focus, select:focus {
      border-color: #e6bc6e;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.5), inset 0 0 2px #ffdfa0;
      background: #2a241c;
    }
    /* daftar marga khusus dark royal */
    .marga-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 12px;
      max-height: 210px;
      overflow-y: auto;
      padding: 6px 4px;
      background: rgba(0,0,0,0.45);
      border-radius: 24px;
      border: 1px solid #55421f;
    }
    .marga-option {
      background: #130f0b;
      padding: 8px 12px;
      border-radius: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #3a2d18;
      font-weight: 500;
      color: #efda9b;
    }
    .marga-option:hover {
      background: #2c241b;
      border-color: #e4b03b;
      transform: scale(0.97);
      box-shadow: 0 0 8px #c7962e;
    }
    .selected-marga {
      background: linear-gradient(145deg, #3f2d12, #241d0e);
      border-color: #eec153;
      color: #ffefb9;
      text-shadow: 0 0 2px black;
      box-shadow: 0 0 6px #f5bc4e;
    }
    button {
      background: radial-gradient(circle at 30% 10%, #c9a247, #8a6529);
      border: none;
      width: 100%;
      padding: 14px;
      font-size: 1.3rem;
      font-weight: bold;
      font-family: 'Cinema', 'Georgia', serif;
      letter-spacing: 2px;
      color: #1f1a0c;
      border-radius: 60px;
      margin-top: 1rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 0 #4f3a18;
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #4f3a18;
    }
    .result-card {
      margin-top: 2rem;
      background: #0c0a08c9;
      border-radius: 2rem;
      padding: 1.4rem;
      border: 1px solid #dbb259;
      text-align: center;
      transition: all 0.4s;
      backdrop-filter: blur(8px);
    }
    .royal-name {
      font-size: 2.2rem;
      font-weight: bold;
      background: linear-gradient(135deg, #fad974, #ca9622);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    .badge-lambang {
      font-size: 2.2rem;
      margin: 12px 0;
    }
    .desc {
      font-size: 0.9rem;
      color: #eeddbb;
      border-top: 1px dashed #b48b3a;
      padding-top: 12px;
      margin-top: 12px;
    }
    footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.7rem;
      opacity: 0.6;
      font-family: monospace;
    }
    hr {
      border-color: #b47c2e33;
      margin: 8px 0;
    }
    @media (max-width: 540px) {
      .royal-container { padding: 1.3rem; }
      .crown-header h1 { font-size: 1.4rem; }
      .royal-name { font-size: 1.5rem; }
    }
    /* scrollbar mewah */
    .marga-list::-webkit-scrollbar {
      width: 5px;
    }
    .marga-list::-webkit-scrollbar-track {
      background: #2f261a;
      border-radius: 10px;
    }
    .marga-list::-webkit-scrollbar-thumb {
      background: #e6b650;
      border-radius: 10px;
    }
  </style>
</head>
<body>
<div class="royal-container">
  <div class="crown-header">
    <div class="crown-icon">👑⚜️</div>
    <h1>✦ SELEKSI MARGA ROYAL ✦</h1>
    <div class="sub">Pilih darah bangsawan — warisan kehormatan</div>
  </div>

  <div class="form-group">
    <label>🪶 Nama Lengkap (Putra/Putri Bangsawan)</label>
    <input type="text" id="namaUser" placeholder="Contoh: Raden Arya Wibisana" autocomplete="off">
  </div>

  <div class="form-group">
    <label>🏰 Pilih Marga Kebesaran</label>
    <div class="marga-list" id="margaListContainer">
      <!-- isi dari javascript -->
    </div>
  </div>

  <button id="btnSeleksi">⚔️ LAKONI SELEKSI ⚔️</button>

  <div class="result-card" id="resultBox" style="display: none;">
    <div class="badge-lambang" id="lambangMarga">🛡️</div>
    <div class="royal-name" id="resultMarga">-</div>
    <div class="desc" id="deskripsiMarga">Keluarga agung yang penuh kharisma dan pengaruh.</div>
    <hr>
    <div style="font-size: 0.85rem; margin-top: 6px;">atas nama <span id="resultNama" style="font-weight: bold; color: #fad161;">—</span></div>
  </div>
  <footer>⚜️ Kementerian Pusaka Nusantara | Royal Edition ⚜️</footer>
</div>

<script>
  // kumpulan marga kerajaan dengan aura gelap & royal (campuran nusantara, fiksi istana)
  const margaData = [
    { nama: "Brawijaya", lambang: "🐉⚔️", deskripsi: "Keturunan Pendekar Langit, pembawa badai dan kedaulatan. Singgasana penuh wibawa." },
    { nama: "Darmakusuma", lambang: "🌙🐅", deskripsi: "Kesatria malam dengan darah biru, pelindung ajaran sakti." },
    { nama: "Wijayakusuma", lambang: "🌸🏹", deskripsi: "Marga bunga abadi, bijaksana dan piawai dalam diplomasi." },
    { nama: "Suryanegara", lambang: "☀️🦅", deskripsi: "Putra matahari, keberanian tak tergoyahkan, penakluk gelombang." },
    { nama: "Nagapati", lambang: "🐍👑", deskripsi: "Penguasa naga bumi, mistis & ditakuti, setia pada mahkota." },
    { nama: "Kertabumi", lambang: "⛰️🌿", deskripsi: "Penjaga tanah subur, marga yang royal dan dermawan." },
    { nama: "Candradewa", lambang: "🌕🕊️", deskripsi: "Dinasti bulan purnama, penuh seni dan ilmu kebijaksanaan." },
    { nama: "Alamsyah", lambang: "📜✒️", deskripsi: "Pencatat sejarah kerajaan, darah intelektual & berwibawa." }
  ];

  let selectedMargaObj = null;

  function renderMargaList() {
    const container = document.getElementById('margaListContainer');
    if(!container) return;
    container.innerHTML = '';
    margaData.forEach((m, idx) => {
      const div = document.createElement('div');
      div.className = 'marga-option';
      if(selectedMargaObj && selectedMargaObj.nama === m.nama) div.classList.add('selected-marga');
      div.innerHTML = `${m.lambang} ${m.nama}`;
      div.onclick = () => {
        // pilih marga
        selectedMargaObj = m;
        // update style semua
        document.querySelectorAll('.marga-option').forEach(opt => opt.classList.remove('selected-marga'));
        div.classList.add('selected-marga');
      };
      container.appendChild(div);
    });
  }

  // event seleksi
  function executeSeleksi() {
    const namaInput = document.getElementById('namaUser').value.trim();
    const resultBox = document.getElementById('resultBox');
    const resultMargaSpan = document.getElementById('resultMarga');
    const resultNamaSpan = document.getElementById('resultNama');
    const lambangSpan = document.getElementById('lambangMarga');
    const deskripsiSpan = document.getElementById('deskripsiMarga');

    if(!namaInput) {
      alert("⚠️ Isi dahulu nama bangsawan sebelum seleksi!");
      return;
    }

    if(!selectedMargaObj) {
      alert("👑 Pilih satu marga kebesaran dari daftar kerajaan!");
      return;
    }

    // royal effect: nama depan diberi gelar opsional (tambah gelar jika belum)
    let finalName = namaInput;
    // supaya lebih royal, jika tidak ada gelar tambah 'Bagus' atau 'Raden' secara halus? tapi biarkan asli user
    // namun lebih keren: tampilkan dengan gelar kehormatan di result.
    const gelarKehormatan = "Yang Mulia";
    const tampilanNama = `${gelarKehormatan} ${finalName}`;

    resultNamaSpan.innerText = tampilanNama;
    resultMargaSpan.innerText = selectedMargaObj.nama;
    lambangSpan.innerHTML = selectedMargaObj.lambang + " ⚜️";
    deskripsiSpan.innerHTML = selectedMargaObj.deskripsi + " — Darah agung yang diakui seantero jagad.";

    resultBox.style.display = "block";
    // efek smooth scroll
    resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    // tambahkan efek kilau kecil
    resultBox.style.transform = "scale(1.01)";
    setTimeout(() => { if(resultBox) resultBox.style.transform = ""; }, 400);
  }

  // set default selected pertama agar user friendly (opsional)
  function setDefaultMarga() {
    if(margaData.length > 0 && !selectedMargaObj) {
      selectedMargaObj = margaData[0];
      renderMargaList(); // refresh untuk highlight
    }
  }

  // event listener
  document.getElementById('btnSeleksi').addEventListener('click', executeSeleksi);
  // inisialisasi daftar
  renderMargaList();
  setDefaultMarga();

  // optional: tekan enter di input nama
  document.getElementById('namaUser').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') executeSeleksi();
  });
</script>
</body>
</html>
