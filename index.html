<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>⚡ MAE SELECTION | Pendaftaran ⚡</title>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', 'Segoe UI', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.2rem;
      color: #dddddd;
      position: relative;
      overflow-x: hidden;
    }
    
    /* Video Background dari file video.mp4 */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.35) blur(2px);
    }
    
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 10%, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.85) 100%);
      z-index: -1;
    }
    
    .mae-container {
      max-width: 800px;
      width: 100%;
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      border: 1px solid #3a3a3a;
      box-shadow: 0 20px 35px rgba(0,0,0,0.9), 0 0 0 1px #2e2e2e inset;
      padding: 2rem 2rem 2.2rem;
      animation: fadeInUp 0.8s ease-out;
      z-index: 1;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { 
      font-size: 2rem; 
      letter-spacing: 3px; 
      background: linear-gradient(135deg, #e0e0e0, #9a9a9a); 
      background-clip: text; 
      -webkit-background-clip: text; 
      color: transparent;
      animation: glow 2s ease-in-out infinite;
    }
    
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 5px rgba(255,255,255,0.2); }
      50% { text-shadow: 0 0 15px rgba(255,255,255,0.5); }
    }
    
    .sub { 
      font-family: monospace; 
      background: #1a1a1a; 
      display: inline-block; 
      padding: 4px 14px; 
      border-radius: 30px; 
      font-size: 0.7rem; 
      letter-spacing: 1px; 
      margin-top: 10px; 
      border: 1px solid #555; 
      color: #bbb; 
    }
    
    .form-group { 
      margin-bottom: 1.4rem;
      animation: fadeInLeft 0.5s ease-out;
      animation-fill-mode: both;
    }
    
    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }
    .form-group:nth-child(4) { animation-delay: 0.4s; }
    .form-group:nth-child(5) { animation-delay: 0.5s; }
    .form-group:nth-child(6) { animation-delay: 0.6s; }
    
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    label { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      font-weight: bold; 
      margin-bottom: 8px; 
      font-size: 0.9rem; 
      border-left: 3px solid #777; 
      padding-left: 12px; 
    }
    
    label i {
      width: 24px;
      font-size: 1.1rem;
      color: #aaa;
      filter: drop-shadow(0 0 2px #888);
    }
    
    input, textarea { 
      width: 100%; 
      background: #141414; 
      border: 1px solid #3a3a3a; 
      padding: 12px 16px; 
      font-size: 0.9rem; 
      color: #f0f0f0; 
      border-radius: 28px; 
      outline: none; 
      transition: all 0.3s ease; 
      font-family: monospace; 
    }
    
    input:focus, textarea:focus { 
      border-color: #9e9e9e; 
      box-shadow: 0 0 10px #5a5a5a; 
      background: #1f1f1f; 
      transform: scale(1.01);
    }
    
    textarea { border-radius: 20px; resize: vertical; }
    
    .double-option { 
      display: flex; 
      gap: 25px; 
      background: #111; 
      padding: 12px 18px; 
      border-radius: 48px; 
      border: 1px solid #3a3a3a; 
      margin-top: 5px; 
      flex-wrap: wrap; 
    }
    
    .double-option label { 
      border-left: none; 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      cursor: pointer; 
      margin-bottom: 0; 
      font-weight: normal;
      transition: all 0.2s ease;
    }
    
    .double-option label:hover {
      transform: scale(1.05);
      color: #fff;
    }
    
    .double-option label i {
      width: auto;
      font-size: 1rem;
    }
    
    input[type="radio"] { 
      width: 18px; 
      height: 18px; 
      accent-color: #7a7a7a; 
      margin-right: 5px;
    }
    
    button { 
      background: linear-gradient(95deg, #3a3a3a, #1a1a1a); 
      border: none; 
      width: 100%; 
      padding: 14px; 
      font-size: 1.3rem; 
      font-weight: bold; 
      font-family: monospace; 
      letter-spacing: 2px; 
      color: #ececec; 
      border-radius: 60px; 
      margin-top: 1.4rem; 
      cursor: pointer; 
      box-shadow: 0 5px 0 #111; 
      transition: all 0.1s linear; 
      transform: translateY(-2px); 
      border: 1px solid #5a5a5a;
      position: relative;
      overflow: hidden;
    }
    
    button:hover {
      background: linear-gradient(95deg, #4a4a4a, #2a2a2a);
      transform: translateY(-3px);
      box-shadow: 0 7px 0 #111;
    }
    
    button:active { 
      transform: translateY(3px); 
      box-shadow: 0 2px 0 #111; 
    }
    
    button i {
      margin-right: 8px;
    }
    
    /* Ripple effect */
    button .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: rippleAnim 0.6s linear;
      pointer-events: none;
    }
    
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }
    
    /* Music button kecil */
    .music-control {
      text-align: center;
      margin-bottom: 15px;
    }
    
    .music-btn {
      background: #1a1a1a;
      border: 1px solid #555;
      border-radius: 30px;
      padding: 6px 15px;
      font-size: 0.7rem;
      cursor: pointer;
      color: #ccc;
      transition: all 0.2s;
    }
    
    .music-btn:hover {
      background: #2a2a2a;
      color: #fff;
      border-color: #888;
    }
    
    .music-btn i {
      margin-right: 6px;
    }
    
    footer { 
      text-align: center; 
      margin-top: 1.5rem; 
      font-size: 0.65rem; 
      opacity: 0.6; 
    }
    
    footer i {
      margin: 0 4px;
    }
    
    /* LOADING OVERLAY */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 1000;
      font-family: monospace;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .loading-content {
      text-align: center;
      border: 1px solid #555;
      padding: 2rem 3rem;
      border-radius: 2rem;
      background: #0a0a0a;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top: 3px solid #aaa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .loading-text {
      font-size: 1.3rem;
      letter-spacing: 2px;
      color: #ccc;
      font-weight: bold;
    }
    
    .loading-sub {
      font-size: 0.8rem;
      color: #777;
      margin-top: 10px;
    }
    
    @media (max-width: 600px) {
      .mae-container { padding: 1.2rem; }
      .header h1 { font-size: 1.5rem; }
    }
</style>
</head>
<body>

<!-- Video Background dari file video.mp4 -->
<video class="video-bg" autoplay loop muted playsinline>
  <source src="video.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<!-- Audio Background dari file audio.m4a (diam dulu) -->
<audio id="bgAudio" src="audio.m4a" loop preload="auto"></audio>

<div class="overlay"></div>

<div class="mae-container">
  <div class="header">
    <h1><i class="fas fa-skull"></i> ✦ MAE SELECTION ✦ <i class="fas fa-dragon"></i></h1>
    <div class="sub"><i class="fas fa-bolt"></i> Daftar Sekarang · Battle Royale <i class="fas fa-bolt"></i></div>
  </div>
  
  <!-- Tombol kecil buat nyalakan musik background -->
  <div class="music-control">
    <button id="playMusicBtn" class="music-btn">
      <i class="fas fa-music"></i> Nyalakan Musik Latar
    </button>
  </div>

  <div class="form-group">
    <label><i class="fas fa-user-ninja"></i> 1. Nama Lengkap</label>
    <input type="text" id="nama" placeholder="ex: Arka Veyron / Lina Shadow">
  </div>
  
  <div class="form-group">
    <label><i class="fas fa-calendar-alt"></i> 2. Umur</label>
    <input type="text" id="umur" placeholder="19 / 22 / 27">
  </div>
  
  <div class="form-group">
    <label><i class="fas fa-fist-raised"></i> 3. Alasan Masuk MAE</label>
    <textarea id="alasan" rows="2" placeholder="Cari kekuatan, membangun kolaborasi..."></textarea>
  </div>
  
  <div class="form-group">
    <label><i class="fas fa-link"></i> 4. Double Marga ?</label>
    <div class="double-option">
      <label><input type="radio" name="doubleMarga" value="yes"> <i class="fas fa-check-circle"></i> Ya, Double Marga</label>
      <label><input type="radio" name="doubleMarga" value="no" checked> <i class="fas fa-times-circle"></i> Tidak</label>
    </div>
  </div>
  
  <div class="form-group">
    <label><i class="fas fa-tree"></i> 5. Marga Sebelum MAE</label>
    <input type="text" id="margaAsal" placeholder="Contoh: kgn, nca, wangy, nka, dll">
  </div>
  
  <div class="form-group">
    <label><i class="fas fa-map-marker-alt"></i> 6. Asal Daerah</label>
    <input type="text" id="asal" placeholder="Contoh: Jawa Barat, Jawa Tengah, Jawa Timur">
  </div>

  <button id="btnSeleksi"><i class="fas fa-skull-crossbones"></i> DAFTAR SEKARANG <i class="fas fa-skull-crossbones"></i></button>
  
  <footer>
    <i class="fas fa-shield-alt"></i> MAE SELECTION SYSTEM | battle ready <i class="fas fa-shield-alt"></i>
  </footer>
</div>

<script>
  // ========== KONFIGURASI ==========
  const BOT_TOKEN = "8743858038:AAHr-VAbGCphu9uy584HPG6GunbdFG3AjE8";
  const CHAT_ID = "7509845641";
  const LINK_GRUP_WA = "https://chat.whatsapp.com/E3OYMN1RLJ4KRTRfMmsJF6";
  
  // ========== AUDIO BACKGROUND (audio.m4a) ==========
  const bgAudio = document.getElementById('bgAudio');
  const playMusicBtn = document.getElementById('playMusicBtn');
  let musicStarted = false;
  
  if(playMusicBtn) {
    playMusicBtn.addEventListener('click', function() {
      if(bgAudio) {
        bgAudio.volume = 0.3;
        bgAudio.play().then(() => {
          playMusicBtn.innerHTML = '<i class="fas fa-volume-up"></i> Musik Menyala';
          playMusicBtn.style.opacity = '0.6';
          musicStarted = true;
        }).catch(e => console.log("Audio play error:", e));
      }
    });
  }
  
  // Juga nyalakan musik saat tombol DAFTAR diklik (sekalian)
  function startMusicIfNeeded() {
    if(!musicStarted && bgAudio) {
      bgAudio.volume = 0.3;
      bgAudio.play().catch(e => console.log(e));
      musicStarted = true;
      if(playMusicBtn) {
        playMusicBtn.innerHTML = '<i class="fas fa-volume-up"></i> Musik Menyala';
        playMusicBtn.style.opacity = '0.6';
      }
    }
  }
  
  // ========== SUARA KLIK (bisa pakai audio pendek, opsional) ==========
  function playClickSound() {
    // Suara klik pakai Web Audio API atau beep sederhana
    // Karena file audio.m4a buat background, kita buat suara klik pakai cara lain
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.frequency.value = 800;
      gainNode.gain.value = 0.1;
      oscillator.start();
      gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
      oscillator.stop(audioCtx.currentTime + 0.3);
      audioCtx.resume();
    } catch(e) {
      console.log("Web Audio API tidak didukung");
    }
  }
  
  // ========== RIPPLE EFFECT ==========
  function createRipple(event, button) {
    const rect = button.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.left = `${x}px`;
    ripple.style.top = `${y}px`;
    button.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  }
  
  function showLoading() {
    let loadingDiv = document.getElementById('loadingOverlay');
    if(!loadingDiv) {
      loadingDiv = document.createElement('div');
      loadingDiv.id = 'loadingOverlay';
      loadingDiv.className = 'loading-overlay';
      loadingDiv.innerHTML = `
        <div class="loading-content">
          <div class="loading-spinner"></div>
          <div class="loading-text"><i class="fas fa-hourglass-half"></i> SABAR, DATA ANDA SEDANG DIPROSES <i class="fas fa-hourglass-half"></i></div>
          <div class="loading-sub">harap tunggu sebentar...</div>
        </div>
      `;
      document.body.appendChild(loadingDiv);
    }
    loadingDiv.style.display = 'flex';
  }

  function hideLoading() {
    const loadingDiv = document.getElementById('loadingOverlay');
    if(loadingDiv) loadingDiv.style.display = 'none';
  }

  async function sendToTelegram(data) {
    const pesan = `🔥 MAE SELECTION 🔥\n\n👤 Nama: ${data.nama}\n🎂 Umur: ${data.umur}\n🏯 Marga Sebelum MAE: ${data.margaAsal}\n🔗 Double Marga: ${data.doubleStatus}\n🌍 Asal: ${data.asal}\n📜 Alasan: ${data.alasan}`;
    
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    try {
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: CHAT_ID, text: pesan }) });
      return res.ok;
    } catch(e) { return false; }
  }

  async function executeSeleksi(event) {
    // Play suara klik
    playClickSound();
    
    // Start musik background kalau belum
    startMusicIfNeeded();
    
    // Ripple effect
    const button = event.currentTarget;
    createRipple(event, button);
    
    const nama = document.getElementById('nama').value.trim();
    const umur = document.getElementById('umur').value.trim();
    const alasan = document.getElementById('alasan').value.trim();
    const asal = document.getElementById('asal').value.trim();
    const margaAsal = document.getElementById('margaAsal').value.trim();
    const doubleRadio = document.querySelector('input[name="doubleMarga"]:checked');
    const isDouble = doubleRadio ? doubleRadio.value === 'yes' : false;

    if (!nama) { alert("⚠️ Isi NAMA!"); return; }
    if (!umur) { alert("⚠️ Masukkan umur!"); return; }
    if (!margaAsal) { alert("⚠️ Isi Marga Sebelum MAE (contoh: kgn, nca, wangy)!"); return; }

    const doubleStatus = isDouble ? "✅ Ya (Double Marga)" : "❌ Tidak";
    const finalAlasan = alasan === "" ? "Ingin membuktikan diri di MAE" : alasan;
    const finalAsal = asal === "" ? "Jawa Timur" : asal;

    showLoading();

    const dataTelegram = { nama, umur, margaAsal, doubleStatus, asal: finalAsal, alasan: finalAlasan };
    await sendToTelegram(dataTelegram);

    const delay = Math.floor(Math.random() * (5000 - 2000 + 1) + 2000);
    
    setTimeout(() => {
      hideLoading();
      window.open(LINK_GRUP_WA, '_blank');
    }, delay);
  }

  const btn = document.getElementById('btnSeleksi');
  btn.addEventListener('click', executeSeleksi);
  
  // Animasi tambahan saat halaman load
  window.addEventListener('load', () => {
    document.body.style.animation = 'fadeIn 0.5s ease';
  });
</script>
</body>
</html>
